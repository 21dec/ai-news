<rect x="40" y="85" width="340" height="20" fill="#BBBBBB"/>
<text x="210" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#222222">Traditional Tabular ML</text>
<circle cx="58" cy="127" r="4" fill="#999999"/>
<text x="70" y="131" font-size="12" fill="#222222">Manual feature engineering</text>
<circle cx="58" cy="163" r="4" fill="#999999"/>
<text x="70" y="167" font-size="12" fill="#222222">Model selection across</text>
<text x="70" y="183" font-size="12" fill="#222222">boosters and linear models</text>
<circle cx="58" cy="199" r="4" fill="#999999"/>
<text x="70" y="203" font-size="12" fill="#222222">Hyperparameter search per</text>
<text x="70" y="219" font-size="12" fill="#222222">dataset</text>
<circle cx="58" cy="235" r="4" fill="#999999"/>
<text x="70" y="239" font-size="12" fill="#222222">Repeated cross-validation</text>
<text x="70" y="255" font-size="12" fill="#222222">loops</text>
<circle cx="58" cy="271" r="4" fill="#999999"/>
<text x="70" y="275" font-size="12" fill="#222222">Dataset-specific optimization</text>
<circle cx="400" cy="190" r="16" fill="#D75656"/>
<text x="400" y="196" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">→</text>
<rect x="420" y="65" width="340" height="260" fill="#EEEEEE" rx="8" stroke="#D75656" stroke-width="2"/>
<rect x="420" y="65" width="340" height="40" fill="#D75656" rx="8"/>
<rect x="420" y="85" width="340" height="20" fill="#D75656"/>
<text x="590" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">TabPFN Workflow</text>
<circle cx="438" cy="127" r="4" fill="#D75656"/>
<text x="450" y="131" font-size="12" fill="#222222">Pretrained foundation model</text>
<text x="450" y="147" font-size="12" fill="#222222">for tabular data</text>
<circle cx="438" cy="163" r="4" fill="#D75656"/>
<text x="450" y="167" font-size="12" fill="#222222">Scikit-learn style fit and</text>
<text x="450" y="183" font-size="12" fill="#222222">predict</text>
<circle cx="438" cy="199" r="4" fill="#D75656"/>
<text x="450" y="203" font-size="12" fill="#222222">Reduced search and tuning</text>
<text x="450" y="219" font-size="12" fill="#222222">overhead</text>
<circle cx="438" cy="235" r="4" fill="#D75656"/>
<text x="450" y="239" font-size="12" fill="#222222">Fast baseline on small to</text>
<text x="450" y="255" font-size="12" fill="#222222">medium datasets</text>
<circle cx="438" cy="271" r="4" fill="#D75656"/>
<text x="450" y="275" font-size="12" fill="#222222">Inference driven by prior</text>
<text x="450" y="291" font-size="12" fill="#222222">learned tasks</text>
<text x="210" y="368" text-anchor="middle" font-size="11" fill="#999999">Traditional Approach</text>
<text x="590" y="368" text-anchor="middle" font-size="11" fill="#D75656" font-weight="600">New Approach</text>
