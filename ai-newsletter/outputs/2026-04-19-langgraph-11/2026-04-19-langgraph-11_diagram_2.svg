<svg xmlns="http://www.w3.org/2000/svg" width="860" height="160" viewBox="0 0 860 160" font-family="Inter, Arial, sans-serif">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#D75656"/>
  </marker>
</defs>
<rect width="860" height="160" fill="#FFFFFF" rx="12"/>
<text x="430" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#222222">LangGraph Execution Model</text>
<rect x="20" y="55" width="140" height="60" fill="#D75656" rx="6" />
<text x="30" y="71" font-size="10" font-weight="700" fill="#F0A0A0">STEP 1</text>
<text x="90" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Define TypedDict</text>
<text x="90" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">State</text>
<line x1="165" y1="85" x2="185" y2="85" stroke="#D75656" stroke-width="2" marker-end="url(#arr)"/>
<rect x="190" y="55" width="140" height="60" fill="#EEEEEE" rx="6" stroke="#D75656" stroke-width="2"/>
<text x="200" y="71" font-size="10" font-weight="700" fill="#D75656">STEP 2</text>
<text x="260" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#222222">Add Nodes and</text>
<text x="260" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#222222">Reducers</text>
<line x1="335" y1="85" x2="355" y2="85" stroke="#D75656" stroke-width="2" marker-end="url(#arr)"/>
<rect x="360" y="55" width="140" height="60" fill="#D75656" rx="6" />
<text x="370" y="71" font-size="10" font-weight="700" fill="#F0A0A0">STEP 3</text>
<text x="430" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Wire Conditional</text>
<text x="430" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Edges</text>
<line x1="505" y1="85" x2="525" y2="85" stroke="#D75656" stroke-width="2" marker-end="url(#arr)"/>
<rect x="530" y="55" width="140" height="60" fill="#EEEEEE" rx="6" stroke="#D75656" stroke-width="2"/>
<text x="540" y="71" font-size="10" font-weight="700" fill="#D75656">STEP 4</text>
<text x="600" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#222222">Compile with</text>
<text x="600" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#222222">Checkpointer</text>
<line x1="675" y1="85" x2="695" y2="85" stroke="#D75656" stroke-width="2" marker-end="url(#arr)"/>
<rect x="700" y="55" width="140" height="60" fill="#D75656" rx="6" />
<text x="710" y="71" font-size="10" font-weight="700" fill="#F0A0A0">STEP 5</text>
<text x="770" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Invoke with</text>
<text x="770" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">thread_id</text>
</svg>