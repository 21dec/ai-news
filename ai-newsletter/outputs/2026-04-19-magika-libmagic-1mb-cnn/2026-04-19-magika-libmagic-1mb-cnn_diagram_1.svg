<svg xmlns="http://www.w3.org/2000/svg" width="800" height="344" viewBox="0 0 800 344" font-family="Inter, Arial, sans-serif">
<rect width="800" height="344" fill="#FFFFFF" rx="12"/>
<text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#222222">libmagic vs Magika for content type detection</text>
<line x1="60" y1="50" x2="740" y2="50" stroke="#EEEEEE" stroke-width="1.5"/>
<rect x="40" y="65" width="340" height="224" fill="#EEEEEE" rx="8"/>
<rect x="40" y="65" width="340" height="40" fill="#BBBBBB" rx="8"/>
<rect x="40" y="85" width="340" height="20" fill="#BBBBBB"/>
<text x="210" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#222222">libmagic</text>
<circle cx="58" cy="127" r="4" fill="#999999"/>
<text x="70" y="131" font-size="12" fill="#222222">Magic byte + signature</text>
<text x="70" y="147" font-size="12" fill="#222222">database matching</text>
<circle cx="58" cy="163" r="4" fill="#999999"/>
<text x="70" y="167" font-size="12" fill="#222222">Weak script language</text>
<text x="70" y="183" font-size="12" fill="#222222">discrimination</text>
<circle cx="58" cy="199" r="4" fill="#999999"/>
<text x="70" y="203" font-size="12" fill="#222222">Office docs collapse to</text>
<text x="70" y="219" font-size="12" fill="#222222">application/zip</text>
<circle cx="58" cy="235" r="4" fill="#999999"/>
<text x="70" y="239" font-size="12" fill="#222222">No per-prediction confidence</text>
<text x="70" y="255" font-size="12" fill="#222222">score</text>
<circle cx="400" cy="172" r="16" fill="#D75656"/>
<text x="400" y="178" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">→</text>
<rect x="420" y="65" width="340" height="224" fill="#EEEEEE" rx="8" stroke="#D75656" stroke-width="2"/>
<rect x="420" y="65" width="340" height="40" fill="#D75656" rx="8"/>
<rect x="420" y="85" width="340" height="20" fill="#D75656"/>
<text x="590" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Magika</text>
<circle cx="438" cy="127" r="4" fill="#D75656"/>
<text x="450" y="131" font-size="12" fill="#222222">~1MB CNN classifier via ONNX</text>
<text x="450" y="147" font-size="12" fill="#222222">runtime</text>
<circle cx="438" cy="163" r="4" fill="#D75656"/>
<text x="450" y="167" font-size="12" fill="#222222">200+ content types supported</text>
<circle cx="438" cy="199" r="4" fill="#D75656"/>
<text x="450" y="203" font-size="12" fill="#222222">Head / middle / tail byte</text>
<text x="450" y="219" font-size="12" fill="#222222">window features</text>
<circle cx="438" cy="235" r="4" fill="#D75656"/>
<text x="450" y="239" font-size="12" fill="#222222">Confidence score for</text>
<text x="450" y="255" font-size="12" fill="#222222">threshold-based routing</text>
<text x="210" y="332" text-anchor="middle" font-size="11" fill="#999999">Traditional Approach</text>
<text x="590" y="332" text-anchor="middle" font-size="11" fill="#D75656" font-weight="600">New Approach</text>
</svg>